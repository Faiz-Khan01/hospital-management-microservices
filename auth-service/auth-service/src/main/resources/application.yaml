server:
  port: 8086

spring:
  application:
    name: auth-service

  datasource:
    url: jdbc:mysql://localhost:3306/hospital_auth_db?createDatabaseIfNotExist=true
    username: root
    password: Password
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/