server:
  port: 8083

spring:
  application:
    name: APPOINTMENT-SERVICE

  datasource:
    url: jdbc:mysql://localhost:3306/appointment_db
    username: root
    password: Password

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/